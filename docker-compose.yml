# Base stack shared across all recipes (Tier 2).
# Bring up with: make up

name: moredevs-fabrica

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fabrica-tsdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fabrica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-fabrica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./lib_comum/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fabrica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fabrica-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - ./lib_comum/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.3.0
    container_name: fabrica-grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
      # Forward Postgres credentials so the provisioned TimescaleDB datasource
      # can interpolate them at boot. Without these, the env var placeholders
      # resolve to empty strings and authentication fails silently.
      POSTGRES_USER: ${POSTGRES_USER:-fabrica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-fabrica}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./lib_comum/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./receita-1-olho-da-fabrica/nivel-1-diy/grafana-dashboards:/var/lib/grafana/dashboards/receita-1-n1:ro
      - ./receita-1-olho-da-fabrica/nivel-2-pro/grafana-dashboards:/var/lib/grafana/dashboards/receita-1-n2:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  grafana_data:
