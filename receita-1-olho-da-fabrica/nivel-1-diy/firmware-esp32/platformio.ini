; PlatformIO project for the ESP32 current sensor node.
;
; PT: Lê o sensor de corrente SCT-013 e publica o RMS em MQTT a cada segundo.
; EN: Reads an SCT-013 current sensor and publishes the RMS over MQTT once
; per second.
;
; Flash with:  pio run -t upload
; Monitor:     pio device monitor -b 115200

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@^6.9
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1

; Per-board configuration is set via build flags so the same firmware can
; be reused on every machine — only WIFI_SSID, WIFI_PASSWORD, MQTT_BROKER
; and MACHINE_ID change. Define these in `secrets.ini` and `extra_configs`
; them, or pass via the build environment (CI).
;
; Example secrets.ini (gitignored):
;
;   [env:esp32dev]
;   build_flags =
;       ${env:esp32dev.build_flags}
;       -DWIFI_SSID=\"FabricaIoT\"
;       -DWIFI_PASSWORD=\"redacted\"
;       -DMQTT_BROKER=\"192.168.1.10\"
;       -DMACHINE_ID=\"linha-3.maquina-1\"
;       -DSENSOR_CALIBRATION_A_PER_V=30.0
